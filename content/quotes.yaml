  quote: "사람들은 당신이 한 말은 잊어도 당신이 그들에게 준 느낌은 잊지 않는다."
  interpretation: "말의 내용보다 그 사람이 옆에 있을 때의 온기가 더 오래 남는다."
  mood: "dawn"
  visual_style: "watercolor"
  bgm_mood: "meditative"
  context: "따뜻한 아침 햇살이 드는 찻집, 두 잔의 차와 마주한 온기"

- author: "Helen Keller"
  source: "낙관주의"
  quote: "삶은 무모한 모험이거나 아무것도 아니다."
  interpretation: "안전하게만 살면 살아있는 것이 아니다. 두려움을 안고 나아가는 것이 진짜 삶이다."
  mood: "city"
  visual_style: "photoreal"
  bgm_mood: "focused"
  context: "폭풍 전야의 바다 절벽, 바람을 맞으며 서 있는 작은 사람의 실루엣"

- author: "Mark Twain"
  source: "격언집"
  quote: "20년 후에는 당신이 한 것보다 하지 않은 것에 더 후회할 것이다."
  interpretation: "실패한 시도보다 시작조차 못 한 것이 더 긴 아쉬움으로 남는다."
  mood: "city"
  visual_style: "ink"
  bgm_mood: "reflective"
  context: "저물어가는 저녁 거리, 닫힌 문 앞에서 돌아서는 한 사람의 뒷모습"

- author: "Benjamin Franklin"
  source: "격언집"
  quote: "지식에 투자하는 것이 가장 높은 이자를 낸다."
  interpretation: "돈은 쓰면 줄어들지만 지식은 쓸수록 복리로 불어난다."
  mood: "dawn"
  visual_style: "watercolor"
  bgm_mood: "meditative"
  context: "새벽 창가의 책상과 펼쳐진 책, 집중하며 메모하는 손"

- author: "Oscar Wilde"
  source: "발언"
  quote: "당신 자신이 되어라. 다른 모든 자리는 이미 차 있다."
  interpretation: "남을 흉내 내는 것은 이미 늦었다. 오직 자기 자신만이 채울 수 있는 자리가 있다."
  mood: "city"
  visual_style: "photoreal"
  bgm_mood: "reflective"
  context: "거울 앞에서 조용히 자신의 모습을 바라보는 한 사람"

- author: "Carl Sagan"
  source: "코스모스"
  quote: "우주는 우리가 이해하는 모든 것보다 크고, 우리는 그 일부다."
  interpretation: "광대한 우주 앞에서 겸손해지는 것이 오히려 자신을 더 소중하게 만든다."
  mood: "city"
  visual_style: "photoreal"
  bgm_mood: "reflective"
  context: "별이 가득한 밤하늘 아래 혼자 서 있는 사람과 무한히 펼쳐진 우주"

# ── 동양 사상가 ───────────────────────────────────────────────
- author: "Sun Tzu"
  source: "손자병법"
  quote: "싸우지 않고 이기는 것이 최선이다."
  interpretation: "힘으로 누르는 것이 아니라 갈등 자체를 만들지 않는 지혜가 진정한 강함이다."
  mood: "city"
  visual_style: "ink"
  bgm_mood: "focused"
  context: "고요한 바둑판 앞의 새벽 서재, 한 수를 내려다보는 집중의 순간"

- author: "Sun Tzu"
  source: "손자병법"
  quote: "자신을 알고 상대를 알면 백 번 싸워도 위태롭지 않다."
  interpretation: "나의 한계와 장점을 정확히 아는 것이 모든 도전의 출발점이다."
  mood: "dawn"
  visual_style: "calligraphy"
  bgm_mood: "meditative"
  context: "새벽 수련장의 고요한 공기, 흔들리지 않는 촛불과 열린 창"

- author: "Zhuangzi"
  source: "장자"
  quote: "나는 내가 나비인 꿈을 꾼 것인지, 나비가 나인 꿈을 꾸고 있는 것인지 모른다."
  interpretation: "현실과 꿈의 경계, 그 불확실함을 받아들이는 것이 자유의 시작이다."
  mood: "rain"
  visual_style: "watercolor"
  bgm_mood: "reflective"
  context: "안개 낀 새벽 연못가, 흔들리는 수면과 날개를 접은 나비"

- author: "Miyamoto Musashi"
  source: "오륜서"
  quote: "오늘은 어제의 나보다, 내일은 오늘의 나보다 나아지는 것, 그것이 전부다."
  interpretation: "경쟁 상대는 남이 아니라 어제의 자기 자신이다."
  mood: "dawn"
  visual_style: "calligraphy"
  bgm_mood: "meditative"
  context: "새벽 수련장과 단정히 놓인 목검, 정갈한 절제의 공간"

# ── 중동·남아시아 사상가 ──────────────────────────────────────
- author: "Rumi"
  source: "마스나비"
  quote: "상처가 생긴 그 자리가 바로 빛이 들어오는 곳이다."
  interpretation: "약해진 틈에서 오히려 새로운 힘이 스며든다. 상처는 끝이 아니라 입구다."
  mood: "rain"
  visual_style: "watercolor"
  bgm_mood: "reflective"
  context: "비 갠 뒤 균열 사이로 빛이 스미는 돌담과 이끼"

- author: "Rumi"
  source: "마스나비"
  quote: "당신이 찾는 것이 당신을 찾고 있다."
  interpretation: "간절히 원하는 것은 이미 내게로 향하고 있다. 방향을 잃지 않으면 된다."
  mood: "dawn"
  visual_style: "ink"
  bgm_mood: "meditative"
  context: "새벽 사막의 능선과 수평선 위로 솟아오르는 빛, 고요한 기다림"

- author: "Kahlil Gibran"
  source: "예언자"
  quote: "일이란 눈에 보이는 사랑이다."
  interpretation: "사랑을 담아 하는 모든 일은 그 자체로 의미가 있다."
  mood: "city"
  visual_style: "watercolor"
  bgm_mood: "focused"
  context: "이른 아침 손길이 닿은 작업대, 정성 어린 작업과 스미는 빛"

- author: "Rabindranath Tagore"
  source: "기탄잘리"
  quote: "눈을 감아야 비로소 볼 수 있는 것이 있다."
  interpretation: "바깥을 향한 시선을 잠시 거두어야 내면의 진실이 보인다."
  mood: "dawn"
  visual_style: "watercolor"
  bgm_mood: "meditative"
  context: "명상 중인 사람의 고요한 뒷모습, 창으로 스미는 부드러운 새벽빛"

# ── 한국 역사 인물 ────────────────────────────────────────────
- author: "이황 (퇴계)"
  source: "성학십도"
  quote: "경(敬)이란 마음을 한 곳에 모아 다른 곳으로 흩어지지 않게 하는 것이다."
  interpretation: "집중이란 힘으로 억누르는 것이 아니라 마음이 저절로 머무는 상태를 만드는 것이다."
  mood: "dawn"
  visual_style: "calligraphy"
  bgm_mood: "meditative"
  context: "고요한 사랑방의 새벽, 먹빛 서예와 빛이 드는 한지창"

- author: "이황 (퇴계)"
  source: "자성록"
  quote: "학문은 날마다 새롭게 하지 않으면 날마다 낡아진다."
  interpretation: "배움은 쌓아두는 것이 아니라 매일 갱신하는 것이다."
  mood: "city"
  visual_style: "ink"
  bgm_mood: "focused"
  context: "아침마다 새로 채우는 빈 종이와 새 먹물, 반복 속의 신선함"

- author: "이이 (율곡)"
  source: "격몽요결"
  quote: "뜻을 세움이 모든 것의 근본이다. 먼저 반드시 사람이 되기를 결심하라."
  interpretation: "방향 없는 노력은 흩어진다. 분명한 뜻이 서야 모든 것이 모인다."
  mood: "dawn"
  visual_style: "calligraphy"
  bgm_mood: "meditative"
  context: "새벽 한지 위에 쓰인 한 줄의 다짐과 그 앞에 선 조용한 결의"

- author: "이이 (율곡)"
  source: "격몽요결"
  quote: "오늘 배우지 않고 내일이 있다고 여기지 말라."
  interpretation: "미루는 것은 가능성이 아니라 시간을 잃는 것이다."
  mood: "city"
  visual_style: "photoreal"
  bgm_mood: "focused"
  context: "이른 아침 비어있는 책상과 아직 열리지 않은 책, 지금 시작의 순간"

- author: "이순신"
  source: "난중일기"
  quote: "신에게는 아직 열두 척의 배가 있사옵니다."
  interpretation: "가진 것이 적어도 그것으로 할 수 있는 것을 다하는 것이 진짜 용기다."
  mood: "city"
  visual_style: "ink"
  bgm_mood: "focused"
  context: "안개 낀 새벽 항구, 홀로 남은 배와 떠오르는 결의의 빛"
