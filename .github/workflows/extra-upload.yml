name: 추가 업로드 (즉시 강제 실행)

on:
  workflow_dispatch:
    inputs:
      visibility:
        description: "공개 범위 (public / private)"
        required: false
        default: "public"

permissions:
  contents: write

concurrency:
  group: daily-essay-short
  cancel-in-progress: false

jobs:
  extra-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Seoul
      TIMEZONE_NAME: Asia/Seoul
      LOCATION_NAME: Seoul, KR
      LOCATION_LATITUDE: "37.5665"
      LOCATION_LONGITUDE: "126.9780"
      FONT_FILE: ${{ github.workspace }}/runtime-assets/NotoSansCJKkr-Regular.otf
      YOUTUBE_CLIENT_SECRETS_FILE: ${{ github.workspace }}/secrets/client_secret.json
      YOUTUBE_TOKEN_FILE: ${{ github.workspace }}/secrets/token.json
      DEFAULT_VISIBILITY: ${{ github.event.inputs.visibility || 'public' }}
      DEFAULT_CATEGORY_ID: "22"
      SHORTS_HASHTAGS: "#Shorts #쇼츠 #에세이 #감성 #아침"
      OPENAI_TEXT_MODEL: gpt-4o
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_IMAGE_MODEL: imagen-4.0-fast-generate-001
      ENABLE_GEMINI_MUSIC: "true"
      GEMINI_MUSIC_MODEL: models/lyria-realtime-exp
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare runtime assets
        run: |
          mkdir -p runtime-assets
          curl -L https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/Korean/NotoSansCJKkr-Regular.otf \
            -o runtime-assets/NotoSansCJKkr-Regular.otf

      - name: Prepare runtime files
        env:
          CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p secrets output/generated_backgrounds output
          printf '%s' "$CLIENT_SECRET_JSON" > secrets/client_secret.json
          printf '%s' "$TOKEN_JSON" > secrets/token.json

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and upload (force)
        run: python scripts/run_daily.py --force

      - name: Persist state
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update daily essay state (extra upload)"
          git pull --rebase origin "$DEFAULT_BRANCH"
          git push origin HEAD:"$DEFAULT_BRANCH"
